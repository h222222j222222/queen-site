<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="퀸의 마인드 인트로 페이지입니다." />
    <meta name="theme-color" content="#151338" />
    <title>퀸의 마인드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="fortune-body page-home">
    <div class="bg-particles" aria-hidden="true">
      <span class="bp1">🇦🇺</span>
      <span class="bp2">🦘</span>
      <span class="bp3">🐨</span>
      <span class="bp4">🐹</span>
      <span class="bp5">✨</span>
      <span class="bp6">💖</span>
      <span class="bp7">👑</span>
    </div>
    <main class="page-shell">
      <section class="panel-card home-panel">
        <div class="loader-visual-standalone">
          <div class="loader-particles">
            <span class="p1">🦘</span>
            <span class="p2">🐨</span>
            <span class="p3">🇦🇺</span>
            <span class="p4">🐹</span>
            <span class="p5">✨</span>
            <span class="p6">💖</span>
          </div>
        </div>
        <div class="panel-decor" aria-hidden="true">
          <span class="panel-corner panel-corner-tl"></span>
          <span class="panel-corner panel-corner-tr"></span>
          <span class="panel-corner panel-corner-br"></span>
          <span class="panel-corner panel-corner-bl"></span>
        </div>
        <div class="cover-arch" aria-hidden="true"><span>QUEEN'S MIND</span></div>
        <div class="home-cta">
          <a class="primary-link" href="./choose.html">운세 보기</a>
        </div>
      </section>
    </main>

    <div class="audio-dock">
      <button class="music-toggle" id="musicToggle" type="button" aria-pressed="false" aria-label="배경음악 켜기">
        🔇
      </button>
      <button class="lyrics-toggle" id="lyricsToggle" type="button">가사</button>
    </div>
    <audio id="bgmAudio" loop preload="auto" playsinline></audio>
    <dialog class="lyrics-dialog" id="lyricsDialog">
      <div class="lyrics-card">
        <p class="lyrics-label">BGM LYRICS</p>
        <pre class="lyrics-content" id="lyricsContent">가사를 불러오는 중...</pre>
        <button class="lyrics-close" id="lyricsClose" type="button">닫기</button>
      </div>
    </dialog>

    <script type="text/javascript" src="./bgm.js"></script>
  </body>
</html>
